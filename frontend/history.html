<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity History — Ziptrrip Todos</title>
    <meta name="description" content="View the complete change history of all todos, including when they were added and when they were completed." />
    <script>
      // Apply saved theme before React renders to avoid flash
      (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/pages/history-main.jsx"></script>
  </body>
</html>
